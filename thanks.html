    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }

        .bg-wood { 
            background-color: #1a1512;

        /* Wood Button Transition and Responsive Sizing */
        .wood-btn {

            width: auto;
            display: block;
        }
 
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/webpic/railroad-tie-texture.jpg');

 /* Replace your existing .wood-btn block with this */
.wood-btn { 
    transition: transform 0.2s ease; 
    height: 80px; /* Increased from 50px */
    width: auto; 
    display: block; 
}
@media (min-width: 1536px) { 
    .wood-btn { height: 100px; } /* Increased from 80px */
}
.wood-btn:hover { transform: scale(1.05); }

       .nav-link-group a .hover-img { display: none; }
        .nav-link-group a:hover .normal-img { display: none; }
        .nav-link-group a:hover .hover-img { display: block; }

        .parchment { background-color: rgba(244, 238, 224, 0.98); border: 1px solid #dcd3bd; }
        .heavy-shadow { text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4); }
/* This specifically stops the 5% growth on the logo images */
.logo-link:hover .wood-btn { 
    transform: scale(1.0) !important; 
}


/* 1. Position the container */
.logo-link {
    position: relative;
    display: inline-block;
    background: transparent; /* Ensures no background bleed */
}

/* 2. The Bottom Image (Normal) */
.logo-link .normal-img {
    opacity: 1;
    /* We remove the transition here so it stays solid */
    transition: none; 
}

/* 3. The Top Image (Hover) */
.logo-link .hover-img {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    /* Only the top image fades in */
    transition: opacity 0.8s ease-in-out;
    z-index: 2;
}

/* 4. Hover State */
.logo-link:hover .hover-img {
    opacity: 1;
}

/* Optional: Hide the normal image ONLY after hover is complete 
   or keep it visible underneath to prevent the 'gap' */
.logo-link:hover .normal-img {
    opacity: 1; /* Keeping this at 1 ensures there is always a solid image */
}

    </style>

<script>
    // Mobile Menu Toggle Logic
    const menuBtn = document.getElementById('mobile-menu-button');
    const closeBtnMobile = document.getElementById('close-mobile-menu');
    const mobileMenu = document.getElementById('mobile-menu');

    function toggleMenu() {
        mobileMenu.classList.toggle('hidden');
        // Prevent scrolling when menu is open
        document.body.classList.toggle('overflow-hidden');
    }

    menuBtn.addEventListener('click', toggleMenu);
    closeBtnMobile.addEventListener('click', toggleMenu);

    // Close menu if a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });
    });

    /* --- Keep your existing Lightbox JS below this line --- */

</script>
