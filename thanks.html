<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Travels | Weeks Creek Haven</title>
    
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }
        h1, h2 { font-family: 'Crimson Text', serif; }
        
        .bg-wood { 
            background-color: #1a1512;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-attachment: fixed;
            background-size: cover;
        }
        
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/webpic/railroad-tie-texture.jpg');
            background-size: auto 100%;
            background-repeat: repeat-x;
            border-bottom: 4px solid #2c241e;
        }

        .wood-btn { transition: transform 0.2s ease; height: 50px; display: block; }
        .wood-btn:hover { transform: scale(1.05); }

        .parchment { background-color: rgba(244, 238, 224, 0.98); border: 1px solid #dcd3bd; }
        .heavy-shadow { text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4); }
    </style>
</head>

<body class="bg-wood min-h-screen flex flex-col">

    <nav class="fixed w-full z-50 railroad-tie-nav py-2 px-6 flex justify-between items-center">
        <a href="index.html" class="flex-shrink-0">
            <img src="/buttons/week-creek-button-crop.jpg" alt="Weeks Creek Haven" class="wood-btn h-14">
        </a>
        <a href="index.html" class="text-white uppercase tracking-widest text-xs font-bold hover:text-green-400 transition">Back to Home</a>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
        <div class="max-w-2xl w-full parchment p-10 md:p-16 rounded-2xl shadow-2xl text-center border-t-8 border-green-900">
            
            <div class="mb-10 flex justify-center">
                <img src="/webpic/Weeks_Creek_Haven_Favicon.png" alt="Weeks Creek Haven Logo" class="h-24 md:h-28 w-auto">
            </div>

            <h1 class="text-5xl md:text-6xl italic text-green-900 mb-4">Happy Trails!</h1>
            <p class="text-xl text-stone-700 font-serif italic mb-12">
                "Thank you for sharing your journey with us at Weeks Creek Haven. Your update and memories have been received."
            </p>

            <p class="text-stone-800 font-bold mb-10 text-lg">Safe travels home, and we hope to see you again soon!</p>
            
            <div class="flex justify-center">
                <a href="index.html" class="inline-block transition-transform hover:scale-105">
                    <img src="/buttons/friends-info.jpg" alt="Return to Main Site" class="h-16 w-auto shadow-xl rounded-lg">
                </a>
            </div>
            
            <p class="text-xs text-stone-500 mt-3 italic">Click to return to the main site.</p>
        </div>
    </main>

    <footer class="py-8 text-center text-stone-400 text-xs uppercase tracking-[0.3em]">
        Weeks Creek Haven | Blue Ridge, Georgia
    </footer>

</body>
</html>
