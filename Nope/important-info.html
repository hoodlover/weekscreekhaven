<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Gateway | Weeks Creek Haven</title>
    
        <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">

    <meta name="description" content="Welcome to Weeks Creek Haven (421 Weeks Creek Rd), your rustic streamside log cabin in Blue Ridge, GA. Located in the Aska Adventure Area with Hot Tub, Fast Fiber Internet, and epic 98-inch TV. Book your escape!">
    
    <meta property="og:title" content="Weeks Creek Haven | Blue Ridge, GA Log Cabin">
    <meta property="og:description" content="A unique chinking log cabin escape! Fast Fiber, large Hot Tub, Streamside relaxation, and room for 11 guests. Check our availability!">
    <meta property="og:image" content="/webpic/Weeks_Creek_Haven_Social_Preview.png">
    <meta property="og:url" content="https://weekscreekhaven.com/">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Lightened base color and increased default weight */
        body { font-family: 'Montserrat', sans-serif; color: #fdfaf6; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Crimson Text', serif; font-weight: 700; }
        
        /* Soft shadow to separate light text from textured backgrounds */
        .text-readable {
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .bg-wood { 
            background-color: #1a1512;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-attachment: fixed;
            background-size: cover;
        }
        
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/webpic/railroad-tie-texture.jpg');
            background-size: auto 100%;
            background-repeat: repeat-x;
            border-bottom: 4px solid #2c241e;
            box-shadow: inset 0px -10px 20px rgba(0,0,0,0.6), 0 4px 6px -1px rgba(0,0,0,0.5);
        }

        .wood-btn {
            transition: transform 0.2s ease;
            height: 50px;
            width: auto;
            display: block;
        }

        @media (min-width: 1536px) { .wood-btn { height: 80px; } }

        .wood-btn:hover { transform: scale(1.05); }

        .nav-link-group a .hover-img { display: none; }
        .nav-link-group a:hover .normal-img { display: none; }
        .nav-link-group a:hover .hover-img { display: block; }

        /* Brighter accent colors for dark mode */
        .accent-green { color: #a3b899; }
        .parchment { background-color: rgba(244, 238, 224, 0.95); border: 1px solid #dcd3bd; color: #3d3128; }
        
        #mobile-menu {
            background-image: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), url('/webpic/railroad-tie-texture.jpg');
            background-size: cover;
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: 0;
        }
  
    </style>
</head>

<body class="bg-wood">

    <nav class="fixed w-full z-50 railroad-tie-nav py-2 px-6 2xl:py-6 2xl:px-12 flex justify-between items-center">
        <a href="index.html" class="flex-shrink-0">
            <img src="/buttons/week-creek-button-crop.jpg" alt="Weeks Creek Haven" class="wood-btn h-14 md:h-16 2xl:h-24">
        </a>
        
        <div class="hidden md:flex space-x-1 2xl:space-x-4 nav-link-group items-center">
            <a href="things-to-do.html">
                <img src="/buttons/to-do-see.jpg" alt="To Do & See" class="wood-btn normal-img">
                <img src="/buttons/to-do-see-hover.jpg" alt="To Do & See" class="wood-btn hover-img">
            </a>
            <a href="need-to-know.html">
                <img src="/buttons/need-to-know.jpg" alt="Need to Know" class="wood-btn normal-img">
                <img src="/buttons/need-to-know-hover.jpg" alt="Need to Know" class="wood-btn hover-img">
            </a>
            <a href="find-us.html">
                <img src="/buttons/find-cabin.jpg" alt="Find Us" class="wood-btn normal-img">
                <img src="/buttons/find-cabin-hover.jpg" alt="Find Us" class="wood-btn hover-img">
            </a>
            <a href="gallery.html">
                <img src="/buttons/cabin-gallery.jpg" alt="Gallery" class="wood-btn normal-img">
                <img src="/buttons/cabin-gallery-hover.jpg" alt="Gallery" class="wood-btn hover-img">
            </a>
            <a href="important-info.html">
                <img src="/buttons/friends-info.jpg" alt="Friends Info" class="wood-btn normal-img">
                <img src="/buttons/friends-info-hover.jpg" alt="Friends Info" class="wood-btn hover-img">
            </a>
        </div>

        <button id="mobile-menu-button" class="md:hidden text-white focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full flex flex-col items-center p-8 space-y-4 md:hidden shadow-2xl border-t border-stone-800">
            <a href="things-to-do.html"><img src="/buttons/to-do-see.jpg" class="h-12" alt="To Do & See"></a>
            <a href="need-to-know.html"><img src="/buttons/need-to-know.jpg" class="h-12" alt="Need to Know"></a>
            <a href="find-us.html"><img src="/buttons/find-cabin.jpg" class="h-12" alt="Find Us"></a>
            <a href="gallery.html"><img src="/buttons/cabin-gallery.jpg" class="h-12" alt="Gallery"></a>
            <a href="important-info.html"><img src="/buttons/friends-info.jpg" class="h-12" alt="Friends Info"></a>
        </div>
    </nav>

    <div id="main-container" class="min-h-screen flex items-center justify-center px-6">

        <div id="gate" class="parchment p-8 md:p-14 rounded-2xl shadow-2xl text-center max-w-md w-full border-t-8 border-green-900">
            <h1 class="text-5xl mb-6 font-serif italic text-green-900 heavy-shadow">The Haven Vault</h1>
            <p class="mb-8 text-stone-600 italic">"Enter your secret word to unlock the cabin guide."</p>
            
            <input type="password" id="passInput" placeholder="Password" 
                   onkeydown="if(event.key === 'Enter') { event.preventDefault(); checkPass(); }"
                   class="w-full p-4 border-2 border-stone-300 rounded-lg mb-4 focus:border-green-800 outline-none text-center text-xl tracking-widest">
            
            <button type="button" onclick="checkPass()" class="w-full bg-green-900 text-white font-bold py-4 rounded-lg hover:bg-black transition shadow-lg uppercase tracking-widest">
                Unlock Haven
            </button>
            
            <p id="error" class="text-red-600 mt-6 font-bold hidden">? Access Denied. Try again!</p>
            
            <div class="mt-8 pt-6 border-t border-stone-200">
                <a href="index.html" class="text-[10px] uppercase tracking-[0.2em] text-stone-400 hover:text-green-900 transition">Back to Main Site</a>
            </div>
        </div>

        <div id="portalContent" style="display:none;" class="parchment p-10 max-w-4xl mx-auto rounded-xl shadow-xl mt-24 mb-12">
            <h2 class="text-4xl text-green-900 mb-4">Welcome, Family & Mates!</h2>
            <p class="text-lg">You've unlocked the inner circle guide for Weeks Creek Haven.</p>
            <hr class="my-6 border-stone-300">
            <ul class="list-disc list-inside space-y-2">
                <li>Wifi Password: [Your Wifi Here]</li>
                <li>Back Door Code: [Your Code Here]</li>
            </ul>
            <button onclick="location.reload()" class="mt-8 text-sm text-stone-500 underline">Lock Vault</button>
        </div>
    </div>

<script>
    function checkPass() {
        const passInput = document.getElementById('passInput');
        const pass = passInput.value.trim().toLowerCase();
        const errorMsg = document.getElementById('error');
        const gate = document.getElementById('gate');
        const portalContent = document.getElementById('portalContent');
        const container = document.getElementById('main-container');

        const passwordMap = {
            "creeklife": "reveal",           
            "family": "reveal",              
            "havenvip": "welcomefam.html",      
            "creek": "welcome.html",         
            "admin421": "maintenance.html",  
            "reeves": "cr-vip.html",         
            "clean": "cleaningchecklist.html",
            "team": "cleaningchecklist.html",
            "cl": "family-portal.html"
        };

        if (passwordMap[pass]) {
            if (passwordMap[pass] === "reveal") {
                gate.style.display = 'none';
                portalContent.style.display = 'block';
                // Remove centering from the container so the list can scroll
                container.classList.remove('flex', 'items-center', 'justify-center');
            } else {
                window.location.href = passwordMap[pass];
            }
        } else {
            errorMsg.classList.remove('hidden');
            passInput.value = '';
            passInput.focus();
        }
    }

    // Mobile Menu Toggle
    const btn = document.getElementById('mobile-menu-button');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });
</script>
</body>
</html>
