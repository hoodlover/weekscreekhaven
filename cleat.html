<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Need to Know | Weeks Creek Haven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">

    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            color: #f3f0ec; 
            scroll-behavior: smooth; 
            font-weight: 500; 
        }
        h1, h2, h3, h4 { 
            font-family: 'Crimson Text', serif; 
            color: #ffffff; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); 
        }
        
        /* Wood background texture */
        .bg-wood { 
            background-color: #1a1512; 
            background-image: url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-blend-mode: multiply;
            background-attachment: fixed;
            background-size: cover;
        }
        
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/webpic/railroad-tie-texture.jpg');
            background-size: auto 100%;
            background-repeat: repeat-x;
            border-bottom: 4px solid #2c241e;
            box-shadow: inset 0px -10px 20px rgba(0,0,0,0.5), 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        .wood-btn {
            transition: transform 0.2s ease;
            height: 50px;
            width: auto;
            display: block;
        }

        .parchment { 
            background-color: rgba(244, 238, 224, 0.95); 
            border: 2px solid #dcd3bd; 
            color: #2c241e; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .accent-green { color: #4a5d4e; }
    </style>
</head>

<body class="bg-wood">

    <nav class="fixed top-0 w-full z-50 railroad-tie-nav py-2 px-6 flex justify-between items-center">
        <a href="index.html" class="flex-shrink-0">
            <img src="/buttons/week-creek-button-crop.jpg" alt="Weeks Creek Haven" class="wood-btn h-14 md:h-16">
        </a>
        
        <div class="hidden md:flex space-x-2 items-center">
            <a href="things-to-do.html"><img src="/buttons/to-do-see.jpg" alt="To Do & See" class="wood-btn"></a>
            <a href="need-to-know.html"><img src="/buttons/need-to-know.jpg" alt="Need to Know" class="wood-btn"></a>
            <a href="find-us.html"><img src="/buttons/find-cabin.jpg" alt="Find Us" class="wood-btn"></a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto pt-24 md:pt-32 px-6">
        <h1 class="text-5xl md:text-6xl mb-12 text-center italic">Cabin Essentials</h1>

        <div class="parchment p-8 rounded-lg space-y-8 mb-12">
            <section>
                <h2 class="text-3xl font-bold border-b border-stone-300 pb-2 mb-4 italic accent-green" style="text-shadow: none; color: #4a5d4e;">Key Cabin Stats</h2>
                <ul class="grid grid-cols-1 md:grid-cols-2 gap-4 text-base">
                    <li><strong>Guests:</strong> 11 Max</li>
                    <li><strong>Beds:</strong> 4 Bedrooms (Sleeps up to 11)</li>
                    <li><strong>Internet:</strong> Gig Fiber Wi-Fi (Password: creeklife)</li>
                    <li><strong>Check-in:</strong> Afternoon of your visit</li>
                    <li><strong>Check-out:</strong> Typically around 3:00 PM</li>
                </ul>
            </section>
        </div>
    </div>

</body>
</html>
