/* This specifically stops the 5% growth on the logo images */
.logo-link:hover .wood-btn { 
    transform: scale(1.0) !important; 
}


/* 1. Position the container */
.logo-link {
    position: relative;
    display: inline-block;
    background: transparent; /* Ensures no background bleed */
}

/* 2. The Bottom Image (Normal) */
.logo-link .normal-img {
    opacity: 1;
    /* We remove the transition here so it stays solid */
    transition: none; 
}

/* 3. The Top Image (Hover) */
.logo-link .hover-img {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    /* Only the top image fades in */
    transition: opacity 0.8s ease-in-out;
    z-index: 2;
}

/* 4. Hover State */
.logo-link:hover .hover-img {
    opacity: 1;
}

/* Optional: Hide the normal image ONLY after hover is complete 
   or keep it visible underneath to prevent the 'gap' */
.logo-link:hover .normal-img {
    opacity: 1; /* Keeping this at 1 ensures there is always a solid image */
}

<script>
    // Mobile Menu Toggle Logic
    const menuBtn = document.getElementById('mobile-menu-button');
    const closeBtnMobile = document.getElementById('close-mobile-menu');
    const mobileMenu = document.getElementById('mobile-menu');

    function toggleMenu() {
        mobileMenu.classList.toggle('hidden');
        // Prevent scrolling when menu is open
        document.body.classList.toggle('overflow-hidden');
    }

    menuBtn.addEventListener('click', toggleMenu);
    closeBtnMobile.addEventListener('click', toggleMenu);

    // Close menu if a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });
    });

    /* --- Keep your existing Lightbox JS below this line --- */
    const galleryItems = document.querySelectorAll('.gallery-item');
    // ... rest of your lightbox code
</script>
