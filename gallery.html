<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Weeks Creek Haven | Blue Ridge Log Cabin</title>
    
    <meta name="description" content="A visual tour of Weeks Creek Haven and our detailed guides to exploring the Blue Ridge area. Explore our chinking log construction and local Aska Adventure Area guides!">
    <meta property="og:title" content="Weeks Creek Haven Gallery | Blue Ridge, GA Log Cabin">
    <meta property="og:image" content="Weeks_Creek_Haven_Social_Preview.jpg">
    <meta property="og:url" content="https://weekscreekhaven.com/gallery.html">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; }
        h1, h2 { font-family: 'Crimson Text', serif; }
        
        /* Consistent Rustic Backgrounds */
        .bg-wood-light { 
            background-color: #fcfaf7;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png'); /* Light wood grain */
        }
        
        .bg-stone-header { 
            background-color: #2c241e;
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png'); /* Stone texture */
        }

        .gallery-item { break-inside: avoid; margin-bottom: 1.5rem; transition: transform 0.3s ease-in-out; cursor: pointer; }
        .gallery-item:hover { transform: scale(1.02); }
        
        .parchment-label { background-color: rgba(244, 238, 224, 0.95); border-top: 1px solid #dcd3bd; }
        .info-graphic-border { border: 4px solid white; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); }
        .accent-green { color: #4a5d4e; }
    </style>
</head>
<body class="bg-wood-light min-h-screen">

    <header class="bg-stone-header py-12 px-6 mb-12 shadow-lg">
        <nav class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-stone-300 hover:text-white transition">← Back to Home</a>
            <h1 class="text-4xl md:text-5xl text-stone-100 text-center">Weeks Creek Haven Gallery</h1>
            <a href="index.html#book" class="bg-green-800 text-white text-xs px-6 py-2.5 rounded-full font-bold uppercase tracking-wider hover:bg-green-700 shadow-md">Book Your Stay</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div class="columns-1 md:columns-2 lg:columns-3 gap-8">
            
            <div class="gallery-item shadow-2xl rounded-lg overflow-hidden border-4 border-white bg-white">
                <img src="Cabin_Front_1.jpg" alt="Weeks Creek Haven Exterior" class="w-full">
                <div class="p-4 parchment-label text-xs italic text-center accent-green font-bold">Exterior Glow at Dusk</div>
            </div>

            <div class="gallery-item info-graphic-border rounded-md overflow-hidden">
                <img src="24_Hiking_Trails.jpg" alt="Hiking Trails Guide" class="w-full">
            </div>

            <div class="gallery-item shadow-2xl rounded-lg overflow-hidden border-4 border-white bg-white">
                <img src="Inside_2.jpeg" alt="Cabin Interior Living Room" class="w-full">
                <div class="p-4 parchment-label text-xs italic text-center accent-green font-bold">Cozy Fireplace & Vaulted Ceilings</div>
            </div>

            <div class="gallery-item info-graphic-border rounded-md overflow-hidden">
                <img src="18_Fun_Things_in_Blue_Ridge.jpg" alt="Blue Ridge Family Activities" class="w-full">
            </div>

            <div class="gallery-item info-graphic-border rounded-md overflow-hidden">
                <img src="21_Recreation_Areas.jpg" alt="Toccoa River Recreation Guide" class="w-full">
            </div>

            <div class="gallery-item info-graphic-border rounded-md overflow-hidden">
                <img src="20_Local_Eats.jpg" alt="Local Dining Guide" class="w-full">
            </div>

            <div class="gallery-item info-graphic-border rounded-md overflow-hidden">
                <img src="04_Cool_Stuff.jpg" alt="Cabin Amenities Guide" class="w-full">
            </div>

            <div class="gallery-item info-graphic-border rounded-md overflow-hidden">
                <img src="02_Need_to_Know.jpg" alt="Key Cabin Stats and Wi-Fi Info" class="w-full">
            </div>

        </div>
    </main>

    <footer class="bg-stone-900 text-stone-500 py-12 px-6 text-center border-t border-stone-800">
        <div class="max-w-7xl mx-auto">
            <p class="text-stone-300 font-serif text-lg mb-2">Weeks Creek Haven</p>
            <p class="text-xs uppercase tracking-widest mb-6">Blue Ridge, Georgia</p>
            <div class="text-xs space-y-2">
                <p>© 2026 Heather & Lance | 421 Weeks Creek Rd.</p>
                <p><a href="index.html#book" class="text-green-400 hover:text-white transition font-bold underline">Ready to book your mountain escape? Click here.</a></p>
            </div>
        </div>
    </footer>

</body>
</html>
