<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Weeks Creek Haven | Blue Ridge Log Cabin</title>
    
    <meta name="description" content="A visual tour of Weeks Creek Haven and our detailed guides to exploring the Blue Ridge area. Explore our chinking log construction and local Aska Adventure Area guides!">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Crimson Text', serif; }
        
        .heavy-shadow {
            text-shadow: 4px 4px 15px rgba(0, 0, 0, 0.9), 0px 0px 30px rgba(0, 0, 0, 0.5);
        }

        .bg-wood { 
            background-color: #fcfaf7;
            background-image: url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-size: cover;
        }
        
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/webpic/railroad-tie-texture.jpg');
            background-size: auto 100%;
            background-repeat: repeat-x;
            border-bottom: 4px solid #2c241e;
            box-shadow: inset 0px -10px 20px rgba(0,0,0,0.5), 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        .wood-btn {
            transition: transform 0.2s ease;
            height: 70px; /* Increased for the bigger nav */
            width: auto;
            display: block;
        }

        .wood-btn:hover { transform: scale(1.05); }

        .nav-link-group a .hover-img { display: none; }
        .nav-link-group a:hover .normal-img { display: none; }
        .nav-link-group a:hover .hover-img { display: block; }

        .parchment { background-color: rgba(244, 238, 224, 0.9); border: 1px solid #dcd3bd; }
        
        /* Lightbox */
        #lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80vh; border: 4px solid white; }
    </style>
</head>
<body class="bg-stone-50">

    <nav class="fixed w-full z-50 railroad-tie-nav py-6 px-8 flex justify-between items-center">
        <a href="index.html" class="flex-shrink-0">
            <img src="/buttons/week-creek-button-crop.jpg" alt="Weeks Creek Haven" class="wood-btn h-20 md:h-24">
        </a>
        
        <div class="hidden lg:flex space-x-2 nav-link-group items-center">
            <a href="things-to-do.html">
                <img src="/buttons/to-do-see.jpg" alt="To Do & See" class="wood-btn normal-img">
                <img src="/buttons/to-do-see-hover.jpg" alt="To Do & See" class="wood-btn hover-img">
            </a>
            <a href="need-to-know.html">
                <img src="/buttons/need-to-know.jpg" alt="Need to Know" class="wood-btn normal-img">
                <img src="/buttons/need-to-know-hover.jpg" alt="Need to Know" class="wood-btn hover-img">
            </a>
            <a href="find-us.html">
                <img src="/buttons/find-cabin.jpg" alt="Find Us" class="wood-btn normal-img">
                <img src="/buttons/find-cabin-hover.jpg" alt="Find Us" class="wood-btn hover-img">
            </a>
            <a href="gallery.html">
                <img src="/buttons/cabin-gallery.jpg" alt="Gallery" class="wood-btn normal-img">
                <img src="/buttons/cabin-gallery-hover.jpg" alt="Gallery" class="wood-btn hover-img">
            </a>
        </div>
    </nav>

    <header class="bg-wood pt-48 pb-24 px-6 mb-12 shadow-inner border-b-8 border-stone-900/10">
        <h1 class="text-5xl md:text-7xl text-white text-center heavy-shadow uppercase tracking-widest">
            Weeks Creek Haven Gallery
        </h1>
        <p class="text-white text-center italic mt-4 heavy-shadow text-xl">A visual tour of our Blue Ridge home</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div class="columns-1 md:columns-2 lg:columns-3 gap-8">
            <div class="gallery-item cursor-pointer mb-8 shadow-2xl rounded-lg overflow-hidden border-4 border-white bg-white transition-transform hover:scale-[1.02]">
                <img src="/gallery/Sun sets over the creekside cabin.jpg" alt="Weeks Creek Haven at Sunset" class="w-full">
                <div class="p-4 text-xs italic text-center text-stone-700 font-bold uppercase tracking-wider">Sunset Over the Haven</div>
            </div>
            
            <div class="gallery-item cursor-pointer mb-8 shadow-2xl rounded-lg overflow-hidden border-4 border-white bg-white transition-transform hover:scale-[1.02]">
                <img src="/gallery/POrch1.jpeg" alt="Front Porch" class="w-full">
                <div class="p-4 text-xs italic text-center text-stone-700 font-bold uppercase tracking-wider">Welcome to the Porch</div>
            </div>

            </div>
    </main>

    <footer class="bg-stone-900 text-stone-400 py-16 px-6 text-center">
        <p class="text-white text-xl font-serif italic mb-2">Weeks Creek Haven</p>
        <p class="text-xs uppercase tracking-widest">© 2026 Heather & Lance | Blue Ridge, Georgia</p>
    </footer>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        const galleryItems = document.querySelectorAll('.gallery-item');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        galleryItems.forEach(item => {
            item.addEventListener('click', () => {
                const img = item.querySelector('img');
                lightboxImg.src = img.src;
                lightbox.style.display = 'flex';
            });
        });

        lightbox.onclick = () => lightbox.style.display = 'none';
    </script>
</body>
</html>
