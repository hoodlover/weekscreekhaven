<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Weeks Creek Haven | Blue Ridge Log Cabin</title>
    
    <meta name="description" content="A visual tour of Weeks Creek Haven and our detailed guides to exploring the Blue Ridge area.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Crimson Text', serif; }
        
        /* Backgrounds */
        .bg-wood { 
            background-color: #fcfaf7;
            background-image: url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-attachment: fixed;
        }
        
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/webpic/railroad-tie-texture.jpg');
            background-size: cover;
            border-bottom: 4px solid #2c241e;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* Improved Font Readability for Nav */
        .wood-btn {
            transition: transform 0.2s ease;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5));
        }
        .wood-btn:hover { transform: scale(1.05); }

        /* Lightbox Styles for "Pop Out" effect */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 100;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #lightbox-img {
            max-width: 90%;
            max-height: 80%;
            border: 8px solid white;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            color: white;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            transition: color 0.3s;
        }
        .nav-btn:hover { color: #4a5d4e; }
        #prev { left: 20px; }
        #next { right: 20px; }
        #close {
            position: absolute;
            top: 20px; right: 30px;
            color: white; font-size: 3rem; cursor: pointer;
        }
        #caption { color: white; margin-top: 15px; font-style: italic; font-size: 1.2rem; }

        .accent-green { color: #4a5d4e; }
        .parchment-label { background-color: rgba(244, 238, 224, 0.95); }
    </style>
</head>
<body class="bg-wood">

    <nav class="fixed w-full z-50 railroad-tie-nav py-4 px-6 md:px-12 flex justify-between items-center">
        <a href="index.html" class="flex-shrink-0">
            <img src="/buttons/week-creek-button-crop.jpg" alt="Weeks Creek Haven" class="h-12 md:h-16 2xl:h-20 wood-btn">
        </a>
        
        <div class="hidden md:flex space-x-2 lg:space-x-4 items-center">
            <a href="things-to-do.html" class="nav-link"><img src="/buttons/to-do-see.jpg" alt="To Do" class="h-10 lg:h-12 wood-btn"></a>
            <a href="need-to-know.html" class="nav-link"><img src="/buttons/need-to-know.jpg" alt="Need to Know" class="h-10 lg:h-12 wood-btn"></a>
            <a href="find-us.html" class="nav-link"><img src="/buttons/find-cabin.jpg" alt="Find Us" class="h-10 lg:h-12 wood-btn"></a>
            <a href="gallery.html" class="nav-link"><img src="/buttons/cabin-gallery.jpg" alt="Gallery" class="h-10 lg:h-12 wood-btn"></a>
            <a href="important-info.html" class="nav-link"><img src="/buttons/friends-info.jpg" alt="Friends Info" class="h-10 lg:h-12 wood-btn"></a>
        </div>

        <button id="mobile-menu-button" class="md:hidden text-white">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </nav>

    <div class="pt-32 pb-12">
        <h1 class="text-4xl md:text-6xl text-stone-900 text-center font-bold mb-8">Weeks Creek Haven Gallery</h1>
        
        <main class="max-w-7xl mx-auto px-6">
            <div class="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8">
                <div class="gallery-item cursor-pointer shadow-2xl rounded-lg overflow-hidden border-4 border-white bg-white transition-transform hover:scale-[1.02]">
                    <img src="/gallery/Sun sets over the creekside cabin.jpg" alt="Weeks Creek Haven at Sunset" class="w-full">
                    <div class="p-4 parchment-label text-xs italic text-center accent-green font-bold">Sunset Over the Haven</div>
                </div>
                </div>
        </main>
    </div>

    <div id="lightbox">
        <span id="close">&times;</span>
        <span id="prev" class="nav-btn">&#10094;</span>
        <img id="lightbox-img" src="" alt="">
        <div id="caption"></div>
        <span id="next" class="nav-btn">&#10095;</span>
    </div>

    <script>
        const galleryItems = document.querySelectorAll('.gallery-item');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const caption = document.getElementById('caption');
        const closeBtn = document.getElementById('close');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');

        let currentIndex = 0;

        const updateLightbox = (index) => {
            currentIndex = index;
            const item = galleryItems[currentIndex];
            const img = item.querySelector('img');
            const label = item.querySelector('.parchment-label');
            lightboxImg.src = img.src;
            caption.innerText = label.innerText;
        };

        galleryItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                lightbox.style.display = 'flex';
                updateLightbox(index);
            });
        });

        const nextImage = () => updateLightbox((currentIndex + 1) % galleryItems.length);
        const prevImage = () => updateLightbox((currentIndex - 1 + galleryItems.length) % galleryItems.length);

        closeBtn.onclick = () => lightbox.style.display = 'none';
        nextBtn.onclick = (e) => { e.stopPropagation(); nextImage(); };
        prevBtn.onclick = (e) => { e.stopPropagation(); prevImage(); };
        
        lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.style.display = 'none'; };
    </script>
</body>
</html>
