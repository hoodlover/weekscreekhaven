<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Travels | Weeks Creek Haven</title>
    
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }
        h1, h2 { font-family: 'Crimson Text', serif; }
        
        .bg-wood { 
            background-color: #1a1512;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-attachment: fixed;
            background-size: cover;
        }
       
        /* Wood Button Transition and Responsive Sizing */
        .wood-btn {
            transition: transform 0.2s ease;
            height: 50px;
            width: auto;
            display: block;
        }
 
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/webpic/railroad-tie-texture.jpg');
            background-size: auto 100%;
            background-repeat: repeat-x;
            border-bottom: 4px solid #2c241e;
        }

 .wood-btn { height: 89px; }          /* was 80px — mobile */

@media (min-width: 768px)  { .wood-btn { height: 80px; } }   /* was 64px — desktop */
@media (min-width: 1536px) { .wood-btn { height: 112px; } }  /* was 96px — 2xl */
.wood-btn:hover { transform: scale(1.05); }

       .nav-link-group a .hover-img { display: none; }
        .nav-link-group a:hover .normal-img { display: none; }
        .nav-link-group a:hover .hover-img { display: block; }

        .parchment { background-color: rgba(244, 238, 224, 0.98); border: 1px solid #dcd3bd; }
        .heavy-shadow { text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4); }
/* This specifically stops the 5% growth on the logo images */
.logo-link:hover .wood-btn { 
    transform: scale(1.0) !important; 
}


/* 1. Position the container */
.logo-link {
    position: relative;
    display: inline-block;
    background: transparent; /* Ensures no background bleed */
}

/* 2. The Bottom Image (Normal) */
.logo-link .normal-img {
    opacity: 1;
    /* We remove the transition here so it stays solid */
    transition: none; 
}

/* 3. The Top Image (Hover) */
.logo-link .hover-img {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    /* Only the top image fades in */
    transition: opacity 0.8s ease-in-out;
    z-index: 2;
}

/* 4. Hover State */
.logo-link:hover .hover-img {
    opacity: 1;
}

/* Optional: Hide the normal image ONLY after hover is complete 
   or keep it visible underneath to prevent the 'gap' */
.logo-link:hover .normal-img {
    opacity: 1; /* Keeping this at 1 ensures there is always a solid image */
}

    </style>
</head>
<body class="bg-wood">

<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<script>
    // Mobile Menu Toggle Logic
    const menuBtn = document.getElementById('mobile-menu-button');
    const closeBtnMobile = document.getElementById('close-mobile-menu');
    const mobileMenu = document.getElementById('mobile-menu');

    function toggleMenu() {
        mobileMenu.classList.toggle('hidden');
        // Prevent scrolling when menu is open
        document.body.classList.toggle('overflow-hidden');
    }

    menuBtn.addEventListener('click', toggleMenu);
    closeBtnMobile.addEventListener('click', toggleMenu);

    // Close menu if a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });
    });

    /* --- Keep your existing Lightbox JS below this line --- */
    const galleryItems = document.querySelectorAll('.gallery-item');
    // ... rest of your lightbox code
</script>
    <main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
        <div class="max-w-2xl w-full parchment p-10 md:p-16 rounded-2xl shadow-2xl text-center border-t-8 border-green-900">
            
            <div class="mb-10 flex justify-center">
                <img src="/webpic/Weeks_Creek_Haven_Favicon.png" alt="Weeks Creek Haven Logo" class="h-24 md:h-28 w-auto">
            </div>

            <h1 class="text-5xl md:text-6xl italic text-green-900 mb-4">Happy Trails!</h1>
            <p class="text-xl text-stone-700 font-serif italic mb-12">
                "Thank you for sharing your journey with us at Weeks Creek Haven. Your update and memories have been received."
            </p>

            <p class="text-stone-800 font-bold mb-10 text-lg">Safe travels home, and we hope to see you again soon!!</p>
            
            <div class="flex flex-col items-center justify-center">
    <a href="index.html" class="group relative inline-block w-64 h-24 overflow-hidden rounded-lg shadow-xl transition-transform duration-300 hover:scale-105">
        <img src="buttons/home.jpg" alt="Return to Home" 
             class="absolute inset-0 w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-0">
        
        <img src="buttons/home-hover.jpg" alt="Return to Home Hover" 
             class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-300 group-hover:opacity-100">
    </a>
    <p class="text-xs text-stone-500 mt-4 italic">Click the sign to return to the main site.</p>
</div>
    </main>

<div id="footer-placeholder"></div>
<script src="footer.js"></script>

</body>
</html>
