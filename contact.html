/* Unified Dark Shadow for High Legibility */

}

               <form action="https://formspree.io/f/mzdjnprj" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <input type="text" name="name" placeholder="*Full Name" required

    <input type="text" name="arrival" placeholder="Arrival Date" onfocus="(this.type='date')"

    <input type="text" name="departure" placeholder="Departure Date" onfocus="(this.type='date')" 
        class="border-b-2 border-stone-800 p-2 text-stone-900 placeholder-stone-600 focus:border-green-800 outline-none parchment">
    
    <textarea name="message" placeholder="Message or Number of guests... or is the toilet glogged again?" rows="3" 
        class="md:col-span-2 border-b-2 border-stone-800 p-2 text-stone-1300 placeholder-stone-600 focus:border-green-800 outline-none parchment"></textarea>
    
    <button type="submit" class="md:col-span-2 bg-green-800 text-white font-bold py-4 rounded hover:bg-green-900 transition shadow-lg text-sm uppercase tracking-widest mt-6">Send Inquiry</button>
