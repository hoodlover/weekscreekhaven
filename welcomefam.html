<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Portal | Weeks Creek Haven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; }
        h1, h2 { font-family: 'Crimson Text', serif; }
        .bg-wood { background-image: url('/webpic/vintage-wooden-board-textured-background.jpg'); background-color: #fcfaf7; }
        .parchment { background-color: rgba(244, 238, 224, 0.95); border: 1px solid #dcd3bd; }
    </style>
</head>
<body class="bg-wood min-h-screen py-12 px-6">
    <div class="parchment p-10 max-w-4xl mx-auto rounded-xl shadow-xl border-t-8 border-green-900">
        <h1 class="text-5xl text-green-900 mb-4 italic">Welcome, Family & Mates!</h1>
        <p class="text-lg italic mb-6">You've unlocked the inner circle guide for Weeks Creek Haven.</p>
        
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white/50 p-6 rounded-lg border border-stone-200">
                <h2 class="text-2xl font-bold mb-4 text-green-800">Essential Access</h2>
                <ul class="space-y-3">
                    <li><strong>WiFi:</strong> [Insert Network Name / Password]</li>
                    <li><strong>Back Door Code:</strong> [Insert Code]</li>
                </ul>
            </div>
            <div class="bg-white/50 p-6 rounded-lg border border-stone-200">
                <h2 class="text-2xl font-bold mb-4 text-green-800">Host Contact</h2>
                <p>Lance & Heather</p>
                <p>[Insert Phone Numbers]</p>
            </div>
        </div>
        
        <div class="mt-10 pt-6 border-t border-stone-300">
            <a href="index.html" class="text-sm font-bold text-green-900 uppercase tracking-widest hover:underline">← Back to Main Site</a>
        </div>
    </div>
</body>
</html>
