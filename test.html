<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/webp" href="webpic/Weeks_Creek_Haven_Favicon.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Weeks Creek Haven</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. UNIVERSAL BACKGROUND: The Dark Vintage Wood */
        body { 
            font-family: 'Montserrat', sans-serif; 
            color: #f4eee0; 
            scroll-behavior: smooth; 
            background-color: #1a1512;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('webpic/vintage-wooden-board-textured-background.webp');
            background-attachment: fixed;
            background-size: cover;
        }

        h1, h2, h3, h4 { font-family: 'Crimson Text', serif; }
        
        /* 2. HEADER STYLE: Consistent with Landing Page */
        .extra-heavy-shadow {
            text-shadow: 2px 2px 8px rgba(0,0,0,1), 0px 0px 20px rgba(0,0,0,0.8);
        }

        /* 3. THE PARCHMENT LABEL: Replacing the white borders */
        .gallery-card {
            break-inside: avoid;
            margin-bottom: 2rem;
            background: rgba(244, 238, 224, 0.95); /* Our new Parchment standard */
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            border: 1px solid #dcd3bd;
        }
        .gallery-card:hover { transform: translateY(-5px); }

        .parchment-label { 
            background-color: transparent;
            color: #3d3128; /* Deep Brown Text */
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-weight: 700;
            border-top: 1px solid rgba(0,0,0,0.1);
            margin-top: 8px;
            padding-top: 8px;
        }

        /* 4. REFINED NAVIGATION (Ensuring height consistency) */
        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('webpic/railroad-tie-texture.webp');
            border-bottom: 4px solid #1a6b3a; /* The Deep Forest Green anchor */
        }

        .wood-btn { height: 80px; transition: transform 0.2s; }
        @media (min-width: 768px)  { .wood-btn { height: 74px; } }
        @media (min-width: 1536px) { .wood-btn { height: 112px; } }
        .wood-btn:hover { transform: scale(1.05); }

        /* Lightbox - matching the Forest theme */
        #lightbox { 
            display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 20, 10, 0.95); justify-content: center; align-items: center; 
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<header class="pt-56 pb-20 px-6 text-center">
    <h1 class="text-5xl md:text-7xl text-white extra-heavy-shadow uppercase tracking-widest font-bold">
        The Haven Collection
    </h1>
    <p class="text-xl italic text-stone-300 mt-4 extra-heavy-shadow">A visual journey through Weeks Creek Haven</p>
</header>

<main class="max-w-7xl mx-auto px-6 pb-24">
    <div class="columns-1 md:columns-2 lg:columns-3 gap-8">
        
        <div class="gallery-card group cursor-pointer" onclick="openLightbox(0)">
            <img src="gallery/Sun sets over the creekside cabin.webp" alt="Sunset" class="w-full rounded-sm">
            <div class="parchment-label text-sm text-center">Sunset Over the Haven</div>
        </div>

        <div class="gallery-card group cursor-pointer" onclick="openLightbox(1)">
            <img src="gallery/Porch1.webp" alt="Porch" class="w-full rounded-sm">
            <div class="parchment-label text-sm text-center">Welcome to the Porch</div>
        </div>

        <div class="gallery-card group cursor-pointer" onclick="openLightbox(2)">
            <img src="gallery/Watch your favorite classic DVDs with your family.webp" alt="Media Room" class="w-full rounded-sm">
            <div class="parchment-label text-sm text-center">Family Movie Night Ready</div>
        </div>

        <div class="gallery-card group cursor-pointer" onclick="openLightbox(3)">
            <img src="webpic/lovethecabin.webp" alt="Cabin Love" class="w-full rounded-sm">
            <div class="parchment-label text-sm text-center">Everything We Love At The Cabin</div>
        </div>

        </div>
</main>

<div id="footer-placeholder"></div>
<script src="footer.js"></script>

</body>
</html>
