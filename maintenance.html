<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Request | Weeks Creek Haven</title>
    <link rel="icon" type="image/webp" href="/webpic/Weeks_Creek_Haven_Favicon.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #fdfaf6; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Crimson Text', serif; font-weight: 700; }
        .bg-wood { 
            background-color: #1a1512;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/webpic/vintage-wooden-board-textured-background.webp');
            background-attachment: fixed;
            background-size: cover;
        }
	.wood-btn { height: 80px; }          /* was 80px — mobile */

@media (min-width: 768px)  { .wood-btn { height: 74px; } }   /* was 64px — desktop */
@media (min-width: 1536px) { .wood-btn { height: 112px; } }  /* was 96px — 2xl */
        #mobile-menu { background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('webpic/railroad-tie-texture.webp'); background-size: cover; }

    .wood-btn:hover { transform: scale(1.05); }
	
        .wood-btn:hover { transform: scale(1.05); }
        .parchment { background-color: rgba(244, 238, 224, 0.95); border: 1px solid #dcd3bd; color: #3d3128; }
        
        /* Custom styling for the form elements to keep them readable */
        input, select, textarea { background-color: #ffffff !important; color: #3d3128 !important; border: 1px solid #dcd3bd !important; }
        input:focus, select:focus, textarea:focus { border-color: #166534 !important; ring: 2px #166534; outline: none; }
    </style>
</head>
<body class="bg-wood">

<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<script>
    const menuBtn = document.getElementById('mobile-menu-button');
    const closeBtnMobile = document.getElementById('close-mobile-menu');
    const mobileMenu = document.getElementById('mobile-menu');

    function toggleMenu() {
        mobileMenu.classList.toggle('hidden');
        document.body.classList.toggle('overflow-hidden');
    }

    menuBtn.addEventListener('click', toggleMenu);
    closeBtnMobile.addEventListener('click', toggleMenu);

    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });
    });
</script>

<div class="min-h-screen pt-32 pb-12 px-6 flex flex-col items-center">
    <div class="parchment p-8 md:p-14 rounded-2xl shadow-2xl max-w-3xl w-full border-t-8 border-orange-800">
        <h1 class="text-4xl text-orange-900 mb-2 italic">Report a Cabin Issue</h1>
        <p class="mb-8 text-stone-600">Spotted something that needs a tool belt? Let Lance & Heather know so we can keep the Haven humming.</p>

        <form action="https://formspree.io/f/mzdjnprj" method="POST" class="space-y-8">
            
            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold uppercase tracking-wide text-stone-800 mb-2">Location of Issue</label>
                    <input type="text" name="location" placeholder="e.g. Kitchen, Loft, Hot Tub Deck" class="w-full p-3 rounded" required>
                </div>
                <div>
                    <label class="block text-sm font-bold uppercase tracking-wide text-stone-800 mb-2">Urgency Level</label>
                    <select name="priority" class="w-full p-3 rounded" required>
                        <option value="low">Low - Just an FYI for later</option>
                        <option value="medium">Medium - Fix when convenient</option>
                        <option value="high">High - Needs attention ASAP</option>
                    </select>
                </div>
            </section>

            <section>
                <h3 class="text-xl font-bold uppercase tracking-widest text-stone-800 border-b border-stone-300 mb-4 pb-1">What's acting up?</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label class="flex items-center space-x-3 bg-stone-100 p-3 rounded hover:bg-stone-200 transition cursor-pointer">
                        <input type="checkbox" name="category[]" value="HVAC" class="w-5 h-5 accent-orange-800"> <span class="text-stone-800">Heating / Cooling</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-stone-100 p-3 rounded hover:bg-stone-200 transition cursor-pointer">
                        <input type="checkbox" name="category[]" value="Plumbing" class="w-5 h-5 accent-orange-800"> <span class="text-stone-800">Plumbing / Leaks</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-stone-100 p-3 rounded hover:bg-stone-200 transition cursor-pointer">
                        <input type="checkbox" name="category[]" value="Electrical" class="w-5 h-5 accent-orange-800"> <span class="text-stone-800">Electrical / Lighting</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-stone-100 p-3 rounded hover:bg-stone-200 transition cursor-pointer">
                        <input type="checkbox" name="category[]" value="Appliances" class="w-5 h-5 accent-orange-800"> <span class="text-stone-800">Appliances (Kitchen/Laundry)</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-stone-100 p-3 rounded hover:bg-stone-200 transition cursor-pointer">
                        <input type="checkbox" name="category[]" value="Connectivity" class="w-5 h-5 accent-orange-800"> <span class="text-stone-800">Wi-Fi / 98-inch TV</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-stone-100 p-3 rounded hover:bg-stone-200 transition cursor-pointer">
                        <input type="checkbox" name="category[]" value="Hot Tub" class="w-5 h-5 accent-orange-800"> <span class="text-stone-800">Hot Tub / Exterior</span>
                    </label>
                </div>
            </section>

            <section>
                <h3 class="text-xl font-bold uppercase tracking-widest text-stone-800 border-b border-stone-300 mb-4 pb-1">Details</h3>
                <div>
                    <label class="block text-sm font-bold mb-1 text-stone-800">Please describe the issue:</label>
                    <textarea name="description" rows="5" placeholder="Be as specific as possible (e.g. 'The third lightbulb from the left in the kitchen is flickering')." class="w-full p-3 border border-stone-300 rounded outline-none bg-white text-stone-800" required></textarea>
                </div>
                <p class="mt-4 text-xs text-stone-500 italic">"If it's urgent (water leak, no heat, etc.), please text Lance immediately at 770.549.9358!"</p>
            </section>

            <button type="submit" class="w-full bg-orange-900 text-white font-bold py-4 rounded hover:bg-black transition shadow-lg uppercase tracking-widest">
                Send Maintenance Report
            </button>
        </form>

     <div id="footer-placeholder"></div>
<script src="footer.js"></script>

    </div>
</div>

<script>document.addEventListener("contextmenu", function(e){ e.preventDefault(); });</script>
</body>
</html>
