<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Book | Weeks Creek Haven</title>
    
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Crimson Text', serif; }
        
        .bg-wood { 
            background-color: #fcfaf7;
            background-image: url('/webpic/vintage-wooden-board-textured-background.jpg');
        }
        
        .parchment { background-color: rgba(244, 238, 224, 0.95); border: 1px solid #dcd3bd; }
        
        .heavy-shadow {
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .input-style {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid #14532d;
            transition: all 0.3s ease;
        }

        .input-style:focus {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid #365314;
            outline: none;
        }
    </style>
</head>
<body class="bg-wood py-12 px-6">

    <div class="max-w-3xl mx-auto parchment p-8 md:p-14 rounded-2xl shadow-2xl border-t-8 border-green-900">
        
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-serif italic text-green-900 mb-4 heavy-shadow">The Haven Guest Book</h1>
            <p class="text-lg text-stone-600 font-serif italic">"Share a favorite adventure, a laugh, or your darkest secret."</p>
        </header>

        <form action="https://formspree.io/f/mzdjnprj" method="POST" enctype="multipart/form-data" class="space-y-8">
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs uppercase tracking-widest font-bold text-stone-500 mb-2">Guest Name(s)</label>
                    <input type="text" name="guest_names" required class="w-full p-3 input-style" placeholder="The Smith Family">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest font-bold text-stone-500 mb-2">Dates of Stay</label>
                    <input type="text" name="stay_dates" class="w-full p-3 input-style" placeholder="Oct 12-15, 2026">
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-serif font-bold text-stone-800 mb-2">What was your favorite mountain adventure? 🌲</label>
                    <textarea name="favorite_adventure" rows="3" required class="w-full p-3 input-style" placeholder="Hiking the Toccoa Swinging Bridge..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-serif font-bold text-stone-800 mb-2">Got a laugh or a "Darkest Secret" for us? 🤫</label>
                    <textarea name="darkest_secret" rows="3" class="w-full p-3 input-style" placeholder="Keep it interesting..."></textarea>
                </div>
            </div>

            <div class="bg-white/40 p-6 rounded-lg border-2 border-dashed border-stone-300">
                <label class="block text-sm font-serif font-bold text-stone-800 mb-2">Upload a memory 📸</label>
                <input type="file" name="upload" accept="image/*" class="text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-100 file:text-green-700 hover:file:bg-green-200">
                <p class="text-[10px] text-stone-400 mt-2 uppercase tracking-tighter">Snap a photo of the creek or the crew!</p>
            </div>

            <div>
                <label class="block text-sm font-serif font-bold text-stone-800 mb-2">How could we have made your stay even better?</label>
                <textarea name="feedback" rows="2" class="w-full p-3 input-style" placeholder="Be honest, we love to improve!"></textarea>
            </div>

            <div class="text-center pt-6">
                <button type="submit" class="bg-green-900 text-white font-bold py-4 px-12 rounded-full hover:bg-black transition-all shadow-xl uppercase tracking-widest">
                    Sign the Book
                </button>
                <p class="mt-6 text-xs text-stone-400 italic">"Get Away, Have Fun and Play, Enjoy Your Stay"</p>
            </div>
        </form>

    </div>

    <footer class="mt-12 text-center text-xs text-stone-500 uppercase tracking-widest">
        Weeks Creek Haven | Hosted by Lance & Heather
    </footer>

</body>
</html>
