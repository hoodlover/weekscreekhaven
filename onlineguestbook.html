<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Book | Weeks Creek Haven</title>
    
    <link rel="icon" type="image/png" href="/webpic/Weeks_Creek_Haven_Favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; color: #3d3128; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Crimson Text', serif; }
        
        /* Wood Button Transition and Responsive Sizing */
        .wood-btn {
            transition: transform 0.2s ease;
            height: 50px;
            width: auto;
            display: block;
        }

        .bg-wood { 
            background-color: #fcfaf7;
            background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('/webpic/vintage-wooden-board-textured-background.jpg');
            background-attachment: fixed;
            background-size: cover;
        }
        
        .parchment { background-color: rgba(244, 238, 224, 0.95); border: 1px solid #dcd3bd; }
        
        .heavy-shadow { text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2); }

        .railroad-tie-nav {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/webpic/railroad-tie-texture.jpg');
            background-size: auto 100%;
            background-repeat: repeat-x;
            border-bottom: 4px solid #2c241e;
            box-shadow: inset 0px -10px 20px rgba(0,0,0,0.6);
        }

/* Replace your existing .wood-btn block with this */
.wood-btn { 
    transition: transform 0.2s ease; 
    height: 70px; /* Increased from 50px */
    width: auto; 
    display: block; 
}
@media (min-width: 1536px) { 
    .wood-btn { height: 100px; } /* Increased from 80px */
}
.wood-btn:hover { transform: scale(1.05); }

        .nav-link-group a .hover-img { display: none; }
        .nav-link-group a:hover .normal-img { display: none; }
        .nav-link-group a:hover .hover-img { display: block; }

        /* Missing class from your original code */
        .input-style {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #d1cebd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-style:focus { border-color: #14532d; }

        @media (min-width: 1536px) { .wood-btn { height: 80px; } }
    </style>
</head>

<body class="bg-wood">

    <nav class="fixed w-full z-50 railroad-tie-nav py-2 px-6 2xl:py-6 2xl:px-12 flex justify-between items-center">
    <a href="index.html" class="flex-shrink-0">
        <img src="/buttons/week-creek-button-crop.jpg" alt="Weeks Creek Haven" class="wood-btn h-16 md:h-20 2xl:h-28">
    </a>
    
    <div class="hidden md:flex space-x-4 2xl:space-x-8 nav-link-group items-center">
        <a href="things-to-do.html">
            <img src="/buttons/to-do-see.jpg" alt="To Do & See" class="wood-btn normal-img">
            <img src="/buttons/to-do-see-hover.jpg" alt="To Do & See" class="wood-btn hover-img">
        </a>
        <a href="need-to-know.html">
            <img src="/buttons/need-to-know.jpg" alt="Need to Know" class="wood-btn normal-img">
            <img src="/buttons/need-to-know-hover.jpg" alt="Need to Know" class="wood-btn hover-img">
        </a>
        <a href="find-us.html">
            <img src="/buttons/find-cabin.jpg" alt="Find Us" class="wood-btn normal-img">
            <img src="/buttons/find-cabin-hover.jpg" alt="Find Us" class="wood-btn hover-img">
        </a>
        <a href="gallery.html">
            <img src="/buttons/cabin-gallery.jpg" alt="Gallery" class="wood-btn normal-img">
            <img src="/buttons/cabin-gallery-hover.jpg" alt="Gallery" class="wood-btn hover-img">
        </a>
        <a href="important-info.html">
            <img src="/buttons/friends-info.jpg" alt="Friends Info" class="wood-btn normal-img">
            <img src="/buttons/friends-info-hover.jpg" alt="Friends Info" class="wood-btn hover-img">
        </a>
    </div>

    <button id="mobile-menu-button" class="md:hidden text-white focus:outline-none">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <div id="mobile-menu" class="hidden absolute top-full left-0 w-full flex flex-col items-center p-8 space-y-4 md:hidden shadow-2xl border-t border-stone-800">
        <a href="things-to-do.html"><img src="/buttons/to-do-see.jpg" class="h-12" alt="To Do & See"></a>
        <a href="need-to-know.html"><img src="/buttons/need-to-know.jpg" class="h-12" alt="Need to Know"></a>
        <a href="find-us.html"><img src="/buttons/find-cabin.jpg" class="h-12" alt="Find Us"></a>
        <a href="gallery.html"><img src="/buttons/cabin-gallery.jpg" class="h-12" alt="Gallery"></a>
        <a href="important-info.html"><img src="/buttons/friends-info.jpg" class="h-12" alt="Friends Info"></a>
    </div>
</nav>

    <div class="pt-32 pb-12 px-6">
        <div class="max-w-3xl mx-auto parchment p-8 md:p-14 rounded-2xl shadow-2xl border-t-8 border-green-900">
            
            <header class="text-center mb-12">
                <h1 class="text-5xl md:text-6xl font-serif italic text-green-900 mb-4 heavy-shadow">The Haven Guest Book</h1>
                <p class="text-lg text-stone-600 font-serif italic">"Share a favorite adventure, a laugh, or your darkest secret."</p>
            </header>

            <form action="https://formspree.io/f/mzdjnprj" method="POST" enctype="multipart/form-data" class="space-y-8">
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest font-bold text-stone-500 mb-2">Guest Name(s)</label>
                        <input type="text" name="guest_names" required class="w-full p-4 input-style" placeholder="The Smith Family">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest font-bold text-stone-500 mb-2">Dates of Stay</label>
                        <input type="text" name="stay_dates" class="w-full p-4 input-style" placeholder="Oct 12-15, 2026">
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-serif font-bold text-stone-800 mb-2">What was your favorite mountain adventure? ??</label>
                        <textarea name="favorite_adventure" rows="3" required class="w-full p-4 input-style" placeholder="Hiking the Toccoa Swinging Bridge..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-serif font-bold text-stone-800 mb-2">Got a laugh or a "Darkest Secret" for us? ??</label>
                        <textarea name="darkest_secret" rows="3" class="w-full p-4 input-style" placeholder="Keep it interesting..."></textarea>
                    </div>
                </div>

                <div class="bg-white/40 p-6 rounded-lg border-2 border-dashed border-stone-300">
                    <label class="block text-sm font-serif font-bold text-stone-800 mb-2">Upload a memory ??</label>
                    <input type="file" name="upload" accept="image/*" class="text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-100 file:text-green-700 hover:file:bg-green-200">
                    <p class="text-[10px] text-stone-400 mt-2 uppercase tracking-tighter">Snap a photo of the creek or the crew!</p>
                </div>

                <div>
                    <label class="block text-sm font-serif font-bold text-stone-800 mb-2">How could we have made your stay even better?</label>
                    <textarea name="feedback" rows="2" class="w-full p-4 input-style" placeholder="Be honest, we love to improve!"></textarea>
                </div>

                <div class="text-center pt-6">
                    <button type="submit" class="bg-green-900 text-white font-bold py-4 px-12 rounded-full hover:bg-black transition-all shadow-xl uppercase tracking-widest">
                        Sign the Book
                    </button>
                    <p class="mt-6 text-[10px] text-stone-400 italic uppercase tracking-widest">
                        "Get Away, Have Fun and Play, Enjoy Your Stay"
                    </p>
                </div>
            </form>
        </div>

        <footer class="mt-12 text-center text-xs text-stone-500 uppercase tracking-widest">
            Weeks Creek Haven | Hosted by Lance & Heather
        </footer>
    </div>

    <script>
        const btn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');
        if(btn) btn.onclick = () => menu?.classList.toggle('hidden');
    </script>
</body>
</html>
