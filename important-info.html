<head>

    <style>
        /* Lightened base color and increased default weight */
        body { font-family: 'Montserrat', sans-serif; color: #fdfaf6; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Crimson Text', serif; font-weight: 700; }
        
        /* Soft shadow to separate light text from textured backgrounds */
        .text-readable {
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .bg-wood {
            background-color: #1a1512;
            background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('webpic/barn.webp');
            background-attachment: fixed;
            background-size: cover;
        }
        
/* DELETE or comment out these lines in each page's <style>: */

/* @media (min-width: 768px)  { .wood-btn { height: 74px; } } */
/* @media (min-width: 1536px) { .wood-btn { height: 112px; } } */

        .wood-btn:hover { transform: scale(1.05); }

        .wood-btn:hover { transform: scale(1.05); }
        .nav-link-group a .hover-img { display: none; }
        .nav-link-group a:hover .normal-img { display: none; }
        .nav-link-group a:hover .hover-img { display: block; }

        /* Brighter accent colors for dark mode */
        .accent-green { color: #a3b899; }
        .parchment { background-color: rgba(244, 238, 224, 0.95); border: 1px solid #dcd3bd; color: #3d3128; }
        
        #mobile-menu {
            background-image: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), url('webpic/railroad-tie-texture.webp');
            background-size: cover;
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: 0;
        }
  
/* This specifically stops the 5% growth on the logo images */
.logo-link:hover .wood-btn { 
    transform: scale(1.0) !important; 
}


/* 1. Position the container */
.logo-link {
    position: relative;
    display: inline-block;
    background: transparent; /* Ensures no background bleed */
}

/* 2. The Bottom Image (Normal) */
.logo-link .normal-img {
    opacity: 1;
    /* We remove the transition here so it stays solid */
    transition: none; 
}

/* 3. The Top Image (Hover) */
.logo-link .hover-img {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    /* Only the top image fades in */
    transition: opacity 0.3s ease-in-out;
    z-index: 2;
}

/* 4. Hover State */
.logo-link:hover .hover-img {
    opacity: 1;
}

/* Optional: Hide the normal image ONLY after hover is complete 
   or keep it visible underneath to prevent the 'gap' */
.logo-link:hover .normal-img {
    opacity: 1; /* Keeping this at 1 ensures there is always a solid image */
}

    </style>
</head>
<body class="bg-wood">

<div id="nav-placeholder"></div>
<script src="nav.js"></script>

    <div id="main-container" class="min-h-screen flex items-center justify-center px-6">

        <div id="gate" class="parchment p-8 md:p-14 rounded-2xl shadow-2xl text-center max-w-md w-full border-t-8 border-green-900">
            <h1 class="text-5xl mb-6 font-serif italic text-green-900 heavy-shadow">The Haven Vault</h1>
            <p class="mb-8 text-stone-600 italic">"Enter your secret word to unlock the cabin guide."</p>
            
            <input type="password" id="passInput" placeholder="Password" autofocus
                   onkeydown="if(event.key === 'Enter') { event.preventDefault(); checkPass(); }"
                   class="w-full p-4 border-2 border-stone-300 rounded-lg mb-4 focus:border-green-800 outline-none text-center text-xl tracking-widest">
            
            <button type="button" onclick="checkPass()" class="w-full bg-green-900 text-white font-bold py-4 rounded-lg hover:bg-black transition shadow-lg uppercase tracking-widest">
                Unlock Haven
            </button>
            
            <p id="error" class="text-red-600 mt-6 font-bold hidden">Access Denied Sucker. Try again!</p>
            
            <div class="mt-8 pt-6 border-t border-stone-200">
                <a href="index.html" class="text-[10px] uppercase tracking-[0.2em] text-stone-400 hover:text-green-900 transition">Back to Main Site</a>
            </div>
        </div>

        <div id="portalContent" style="display:none;" class="parchment p-10 max-w-4xl mx-auto rounded-xl shadow-xl mt-40 mb-12">
            <h2 class="text-4xl text-green-900 mb-4">Welcome, Family & Mates!</h2>
            <p class="text-lg">You've unlocked the inner circle guide for Weeks Creek Haven.</p>
            <hr class="my-6 border-stone-300">
            <ul class="list-disc list-inside space-y-2">
                <li>Wifi Password: creeklife</li>
                <li>Back Door Code: <b>222246</b></li>
            </ul>
            <button onclick="location.reload()" class="mt-8 text-sm text-stone-500 underline">Lock Vault</button>
        </div>
    </div>

<script>
    function checkPass() {
            const passInput = document.getElementById('passInput');
            const pass = passInput.value.trim().toLowerCase();
            const errorMsg = document.getElementById('error');
            const gate = document.getElementById('gate');
            const portalContent = document.getElementById('portalContent');
            const container = document.getElementById('main-container');

            const passwordMap = {
                "creeklife": "reveal",           
                "family": "contact.html",              
                "havenvip": "welcomefam.html",      
                "creek": "contact.html",         
                "admin421": "guest-private.html",  
                "reeves": "cr-vip.html",         
                "clean": "cleaningchecklist.html",
                "team": "cleaningchecklist.html",
                "cl": "guest-private.html"
            };

            if (passwordMap[pass]) {
                if (passwordMap[pass] === "reveal") {
                    gate.style.display = 'none';
                    portalContent.style.display = 'block';
                    container.classList.remove('flex', 'items-center', 'justify-center');
                } else {
                    window.location.href = passwordMap[pass];
                }
            } else {
                // REDIRECT ON WRONG PASSWORD
                window.location.href = "contact.html";
                
                /* Optional: If you want them to see the error message 
                   for a second before redirecting, use this instead:
                   
                   errorMsg.classList.remove('hidden');
                   setTimeout(() => {
                       window.location.href = "contact.html";
                   }, 1000); 
                */
            }
        }

    // Basic toggle for mobile navigation
    const menuBtn = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    if(menuBtn && mobileMenu) {
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    }
</script>
</body>
</html>
